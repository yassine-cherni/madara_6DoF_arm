# ── Controller Manager ──────────────────────────────────────────────────────
controller_manager:
  ros__parameters:
    update_rate: 100    # Hz — must be >= Arduino PID rate (also 100 Hz)
    madara_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    hand_controller:
      type: position_controllers/GripperActionController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ── Arm trajectory controller ─────────────────────────────────────────────
# Controls: top_plate (DC motor) + lower_arm + upper_arm + wrist + claw_base
#
# state_interfaces includes velocity because ALL 5 joints export a velocity
# state interface. DC motor: real encoder velocity. Servos: 0.0 rad/s (open-loop).
# JTC Humble requires the same set of state interfaces from every joint it
# manages — if any joint is missing velocity the controller manager refuses
# to activate the entire controller.
madara_arm_controller:
  ros__parameters:
    joints:
      - top_plate_joint     # DC motor (continuous, encoder-backed)
      - lower_arm_joint     # MG966R — holds at 1.5708 rad on startup
      - upper_arm_joint     # MG966R
      - wrist_joint         # MG966R
      - claw_base_joint     # MG966R
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # FIX (CRITICAL #1) — per-joint goal tolerances.
    #
    # Without these JTC Humble uses 0.0 as the default position tolerance,
    # which disables the arrival check entirely. The controller was declaring
    # success purely when trajectory time elapsed — even when nothing moved.
    #
    # top_plate_joint has a real encoder so 0.05 rad is a meaningful check.
    # Servo joints echo their command as state (open-loop), so goal: 0.0
    # leaves their check disabled — a non-zero value would always pass anyway
    # but could mask future issues if real feedback is ever added.
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
      top_plate_joint:
        goal: 0.05      # real encoder — verify actual arrival within 0.05 rad
      lower_arm_joint:
        goal: 0.0       # open-loop servo — echo always passes, leave disabled
      upper_arm_joint:
        goal: 0.0
      wrist_joint:
        goal: 0.0
      claw_base_joint:
        goal: 0.0

# ── Gripper action controller ──────────────────────────────────────────────
# GripperActionController needs position command + position state from right_claw.
# right_claw_joint provides both (open-loop servo, state = echo of command).
#
# FIX (CRITICAL #2) — stall_timeout reduced from 1.0 s → 0.2 s.
#
# right_claw always reports vel = 0.0 (open-loop echo). With stall_timeout: 1.0
# a stall was detected on every single goal after exactly 1 second, causing an
# artificial 1 s delay on every gripper action even though the servo already
# reached its target. 200 ms is more than enough for an open-loop MG966R.
hand_controller:
  ros__parameters:
    joint: right_claw_joint
    action_monitor_rate: 20.0
    allow_stalling: true
    stall_velocity_threshold: 0.001
    stall_timeout: 0.2    # FIX: was 1.0 — eliminated 1 s artificial delay
